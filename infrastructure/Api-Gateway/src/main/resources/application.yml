server:
  port: 8080

spring:
  application:
    name: Api-Gateway

  cloud:
      gateway:

        globalcors:
          add-to-simple-url-handler-mapping: true
          cors-configurations:
            '[/**]':
              allowedOrigins: "http://localhost:5173"
              allowedMethods: "*"
              allowedHeaders: "*"
              allowCredentials: true


        routes:
          - id: fleet-service-route
            uri: lb://FLEET-SERVICE
            predicates:
              - Path=/api/v1/vehicles/** , /api/v1/hubs/**


          - id: user-service-route
            uri: lb://USER-SERVICE
            predicates:
              - Path=/api/v1/auth/**






eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/


management:
  endpoints:
    web:
      exposure:
        include: "*"